name: npm-publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name
        required: true
        type: string

concurrency:
  group: npm-publish-${{ github.event.inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run typecheck
        run: bun run typecheck

      - name: Verify tag matches package version
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name || github.ref_name }}"
          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

  build:
    name: build (${{ matrix.platform }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
          - platform: darwin-arm64
            runner: macos-14
          - platform: darwin-x64
            runner: macos-15-intel
          - platform: windows-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build npm package
        run: bun run npm:build-package -- --platform ${{ matrix.platform }} --out-dir dist/npm-packages

      - name: Upload npm package
        uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.platform }}
          path: dist/npm-packages/ai-agent-switch-${{ matrix.platform }}
          if-no-files-found: error

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          path: dist/npm-packages

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access public dist/npm-packages/npm-linux-x64
          npm publish --access public dist/npm-packages/npm-darwin-arm64
          npm publish --access public dist/npm-packages/npm-darwin-x64
          npm publish --access public dist/npm-packages/npm-windows-x64

      - name: Sync root package optionalDependencies
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const packageJsonPath = "package.json";
          const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
          const version = packageJson.version;
          packageJson.optionalDependencies = {
            "ai-agent-switch-linux-x64": version,
            "ai-agent-switch-darwin-arm64": version,
            "ai-agent-switch-darwin-x64": version,
            "ai-agent-switch-windows-x64": version,
          };
          fs.writeFileSync(packageJsonPath, `${JSON.stringify(packageJson, null, 2)}\n`);
          NODE

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
